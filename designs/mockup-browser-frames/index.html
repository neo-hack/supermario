<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chrome Browser Mockup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="preview-nav" aria-label="Mockup previews">
      <a class="preview-link is-active" href="./index.html">Chrome Light</a>
      <a class="preview-link" href="./chrome-dark.html">Chrome Dark</a>
      <a class="preview-link" href="./safari-light.html">Safari Light</a>
      <a class="preview-link" href="./safari-dark.html">Safari Dark</a>
    </nav>
    <main class="stage" aria-label="Chrome browser mockup">
      <section class="browser" aria-label="Khazifire website in Chrome">
        <header class="toolbar">
          <div class="tab-bar">
            <div class="window-controls" aria-hidden="true">
              <span class="control control-close"></span>
              <span class="control control-minimize"></span>
              <span class="control control-maximize"></span>
            </div>

            <div class="tab">
              <span class="tab-title">Khazifire - Web mockups</span>
              <img class="tab-end" src="./assets/tab-end.svg" alt="" />
              <button class="tab-close" aria-label="Close tab"></button>
            </div>

            <button class="new-tab" aria-label="New tab">
              <img src="./assets/plus.svg" alt="" />
            </button>

            <button class="tab-menu" aria-label="Tab menu">
              <img src="./assets/chevron.svg" alt="" />
            </button>
          </div>

          <div class="nav-bar">
            <button class="nav-button" aria-label="Back">
              <img src="./assets/back.svg" alt="" />
            </button>
            <button class="nav-button" aria-label="Forward">
              <img src="./assets/forward.svg" alt="" />
            </button>
            <button class="nav-button refresh" aria-label="Refresh">
              <img src="./assets/refresh.svg" alt="" />
            </button>

            <div class="address-bar" role="textbox" aria-label="Address">
              <img class="address-lock" src="./assets/padlock.svg" alt="" />
              <span>khazifire.com</span>
              <button class="address-action share" aria-label="Share">
                <img src="./assets/share.svg" alt="" />
              </button>
              <button class="address-action star" aria-label="Bookmark">
                <img src="./assets/star.svg" alt="" />
              </button>
            </div>

            <button class="chrome-action" aria-label="Extensions">
              <img src="./assets/extension.svg" alt="" />
            </button>
            <button class="chrome-action" aria-label="Profile">
              <img src="./assets/toggle.svg" alt="" />
            </button>
            <button class="chrome-action more" aria-label="More options">
              <img src="./assets/more.svg" alt="" />
            </button>
          </div>
          <div class="toolbar-shadow"></div>
        </header>

        <div class="screen">
          <img
            src="./assets/khazifire-screen.png"
            alt="Khazifire portfolio homepage"
          />
        </div>
      </section>
    </main>
  </body>
</html>
