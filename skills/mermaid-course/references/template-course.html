<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT_NAME}} - Codebase Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg-void: #07080a;
    --surface-100: #101111;
    --surface-card: #1b1c1e;
    --border: rgba(255, 255, 255, 0.06);
    --border-visible: rgba(255, 255, 255, 0.1);
    --text-primary: #f9f9f9;
    --text-secondary: #cecece;
    --text-tertiary: #9c9c9d;
    --text-dim: #6a6b6c;
    --text-dark: #434345;
    --accent-red: #FF6363;
    --accent-blue: hsl(202, 100%, 67%);
    --accent-green: hsl(151, 59%, 59%);
    --accent-yellow: hsl(43, 100%, 60%);
    --glow-blue: hsla(202, 100%, 67%, 0.15);
    --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    font-family: var(--font-primary);
    font-feature-settings: 'calt', 'kern', 'liga', 'ss03';
    background: var(--bg-void);
    -webkit-font-smoothing: antialiased;
  }
  #root { display: flex; height: 100vh; }

  .map-area {
    flex: 1; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; background: var(--bg-void);
  }
  .map-area::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--surface-100) 1px, transparent 1px),
      linear-gradient(90deg, var(--surface-100) 1px, transparent 1px);
    background-size: 20px 20px;
    opacity: 0.3;
  }
  #flow-container {
    position: relative; z-index: 1;
    transform-origin: center center;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #flow-container svg { max-width: none; }

  .top-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 4;
    padding: 12px 20px;
    background: linear-gradient(to bottom, var(--bg-void) 40%, transparent);
    display: flex; align-items: center; gap: 12px; pointer-events: none;
  }
  .top-bar h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.3px; color: var(--text-primary); }
  .top-bar .badge {
    font-size: 12px; font-weight: 600;
    color: var(--text-primary);
    background: var(--surface-card);
    padding: 2px 10px; border-radius: 6px;
  }
  .start-guide {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 5;
    background: var(--surface-100);
    border: 1px solid var(--border-visible);
    padding: 10px 20px; border-radius: 8px;
    color: var(--text-dim); font-size: 14px; font-weight: 500;
    letter-spacing: 0.2px; pointer-events: none; opacity: 0.9;
    box-shadow: rgba(0,0,0,0.5) 0px 0px 0px 2px, rgba(255,255,255,0.19) 0px 0px 14px;
    transition: opacity 0.3s;
  }
  .start-guide.hidden { opacity: 0; pointer-events: none; }

  .breadcrumb {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 10px 20px;
    background: var(--surface-100);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; letter-spacing: 0.2px;
  }
  .breadcrumb a {
    color: var(--text-dim); text-decoration: none;
    transition: opacity 0.2s;
  }
  .breadcrumb a:hover { opacity: 0.6; color: var(--text-primary); }
  .breadcrumb .sep { color: var(--text-dark); }
  .breadcrumb .current { color: var(--text-secondary); }

  .zoom-controls {
    position: absolute; bottom: 20px; right: 20px; z-index: 5;
    display: flex; flex-direction: column; gap: 4px;
  }
  .zoom-btn {
    width: 36px; height: 36px; border: none; border-radius: 6px;
    background: var(--surface-100); color: var(--text-tertiary);
    font-size: 18px; cursor: pointer;
    border: 1px solid var(--border-visible);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
  }
  .zoom-btn:hover { opacity: 0.6; }

  .detail-panel {
    width: 480px;
    background: var(--surface-100);
    color: var(--text-primary);
    overflow-y: auto;
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    font-size: 14px; letter-spacing: 0.2px; font-weight: 500;
  }
  .detail-panel.empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
  }
  .detail-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .detail-header h2 {
    font-size: 22px; font-weight: 400; line-height: 1.15;
    color: var(--text-primary); letter-spacing: 0; margin-bottom: 6px;
  }
  .detail-header p {
    font-size: 14px; font-weight: 500; line-height: 1.6;
    color: var(--text-secondary); letter-spacing: 0.2px;
  }
  .detail-files {
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .detail-files span {
    font-size: 12px; font-weight: 600;
    color: var(--text-primary);
    background: var(--surface-card);
    padding: 3px 8px; border-radius: 6px;
  }
  .step-section { flex: 1; padding: 20px 24px; }
  .step-counter { font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; }
  .step-title { font-size: 14px; font-weight: 600; color: var(--accent-blue); letter-spacing: 0.2px; margin-bottom: 12px; }
  .code-block {
    background: var(--bg-void); border-radius: 12px; padding: 16px;
    font-family: var(--font-mono); font-size: 13px; font-weight: 400;
    line-height: 1.7; letter-spacing: 0.2px; overflow-x: auto;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    box-shadow: rgb(27,28,30) 0px 0px 0px 1px, rgb(7,8,10) 0px 0px 0px 1px inset;
  }
  .code-block .line { display: block; padding: 0 8px; border-radius: 3px; }
  .code-block .line.highlighted { background: var(--glow-blue); }
  .code-block .line-num {
    color: var(--text-dark); display: inline-block; width: 28px;
    text-align: right; margin-right: 16px; user-select: none;
  }
  .explanation {
    font-size: 13px; font-weight: 500; line-height: 1.6; letter-spacing: 0.2px;
    color: var(--text-secondary); margin-bottom: 16px; padding: 12px;
    background: var(--glow-blue); border-radius: 8px;
    border-left: 3px solid var(--accent-blue);
  }
  .nav-buttons {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  .nav-btn {
    flex: 1; padding: 10px; border: none; border-radius: 6px;
    cursor: pointer; font-family: var(--font-primary);
    font-size: 14px; font-weight: 600; letter-spacing: 0.3px;
    transition: opacity 0.2s;
  }
  .nav-btn:hover { opacity: 0.6; }
  .nav-btn.primary {
    background: hsla(0,0%,100%,0.06); color: var(--text-primary);
    box-shadow: rgba(255,255,255,0.05) 0px 1px 0px 0px inset,
                rgba(255,255,255,0.25) 0px 0px 0px 1px,
                rgba(0,0,0,0.2) 0px -1px 0px 0px inset;
  }
  .nav-btn.secondary {
    background: transparent; color: var(--text-dim);
    box-shadow: rgba(255,255,255,0.05) 0px 1px 0px 0px inset;
  }
  .nav-btn.secondary:hover { color: var(--text-primary); }

  .node-active { filter: drop-shadow(0 0 12px rgba(255,99,99,0.4)); }

  @keyframes flowDash { to { stroke-dashoffset: -20; } }
  .flow-active {
    stroke: var(--accent-red) !important;
    stroke-width: 2.5px !important;
    stroke-dasharray: 8 4 !important;
    animation: flowDash 0.5s linear infinite !important;
    filter: drop-shadow(0 0 6px rgba(255,99,99,0.5));
  }
  .flow-idle {
    stroke: #434345 !important;
    stroke-dasharray: 6 4 !important;
    animation: flowDash 1s linear infinite !important;
  }
  .flow-dim {
    stroke: #252829 !important;
    stroke-dasharray: 3 6 !important;
    animation: none !important;
  }
</style>
</head>
<body>
<div id="root">
  <div class="map-area" style="padding-top: 42px;">
    <div class="breadcrumb">
      <a href="{{BACK_LINK}}">\u2190 {{PROJECT_NAME}}</a>
      <span class="sep">/</span>
      <span class="current">{{BREADCRUMB_TITLE}}</span>
    </div>
    <div class="top-bar">
      <h1>{{PROJECT_NAME}}</h1>
      <span class="badge">{{LANGUAGE}}</span>
    </div>
    <div id="flow-container">
      <pre class="mermaid" id="mermaid-chart">
{{MERMAID_GRAPH}}
      </pre>
    </div>
    <div class="start-guide" id="start-guide">Click any module to start exploring</div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()" title="Zoom in">+</button>
      <button class="zoom-btn" onclick="zoomOut()" title="Zoom out">&minus;</button>
      <button class="zoom-btn" onclick="zoomReset()" title="Reset">&#8634;</button>
    </div>
  </div>
  <div class="detail-panel empty" id="detail-panel">Click a module to explore</div>
</div>

<script>
// ═══════════════════════════════════════════════════
// SECTION 1: COURSE DATA — replace with real data
// ═══════════════════════════════════════════════════
const PAGE_MODE = 'module'; // 'module' or 'perspective'
const COURSE = {
  flowOrder: ["A", "B", "C"],
  "A": {
    label: "Module A",
    summary: "Description of module A.",
    files: ["path/to/fileA"],
    steps: [
      {
        title: "Step 1: Overview",
        code: "// real code from fileA\nfunction hello() {\n  return 'world';\n}",
        highlightLines: [2, 3],
        explanation: "This function does X because Y."
      }
    ]
  },
  "B": {
    label: "Module B",
    summary: "Description of module B.",
    files: ["path/to/fileB"],
    steps: [
      {
        title: "Step 1: Core Logic",
        code: "// real code from fileB\nconst result = process(data);",
        highlightLines: [2],
        explanation: "The process function transforms raw data into structured output."
      }
    ]
  },
  "C": {
    label: "Module C",
    summary: "Description of module C.",
    files: ["path/to/fileC"],
    steps: [
      {
        title: "Step 1: Entry Point",
        code: "// real code from fileC\nexport default main;",
        highlightLines: [2],
        explanation: "This is the main entry point that wires everything together."
      }
    ]
  }
};

// ═══════════════════════════════════════════════════
// SECTION 2: Runtime — do not modify below
// ═══════════════════════════════════════════════════
let currentId = null;
let currentStep = 0;
let zoomLevel = 1;

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPanel() {
  const panel = document.getElementById('detail-panel');
  if (!currentId) {
    panel.className = 'detail-panel empty';
    panel.innerHTML = 'Click a module to explore';
    return;
  }
  const d = COURSE[currentId];
  if (PAGE_MODE === 'perspective') {
    const node = PERSPECTIVE.nodes.find(n => n.id === currentId);
    if (!node) {
      panel.className = 'detail-panel empty';
      panel.innerHTML = 'Click a node to explore';
      return;
    }
    panel.className = 'detail-panel';
    panel.innerHTML = `
      <div class="detail-header">
        <h2>${node.label}</h2>
        <p>${node.summary}</p>
      </div>
      <div class="nav-buttons">
        <a class="nav-btn primary" href="${node.deepLink}" style="text-align:center;text-decoration:none;">Deep dive into ${node.label} \u2192</a>
      </div>
    `;
    return;
  }
  const step = d.steps[currentStep] || d.steps[0];
  const lines = step.code.split('\n');
  const hasPrev = d.steps.length > 1 && currentStep > 0;
  const hasNext = d.steps.length > 1 && currentStep < d.steps.length - 1;

  panel.className = 'detail-panel';
  panel.innerHTML = `
    <div class="detail-header">
      <h2>${d.label}</h2>
      <p>${d.summary}</p>
    </div>
    <div class="detail-files">
      ${d.files.map(f => `<span>${f}</span>`).join('')}
    </div>
    <div class="step-section">
      <div class="step-counter">Step ${currentStep + 1} / ${d.steps.length}</div>
      <div class="step-title">${step.title}</div>
      <div class="code-block">
        ${lines.map((line, i) => {
          const n = i + 1;
          const hl = step.highlightLines.includes(n);
          return `<span class="line${hl ? ' highlighted' : ''}"><span class="line-num">${n}</span>${escapeHtml(line)}</span>`;
        }).join('')}
      </div>
      <div class="explanation">${step.explanation}</div>
    </div>
    <div class="nav-buttons">
      ${hasPrev ? '<button class="nav-btn secondary" onclick="prevStep()">\u2190 Prev step</button>' : ''}
      ${hasNext ? '<button class="nav-btn primary" onclick="nextStep()">Next step \u2192</button>' : ''}
      <button class="nav-btn primary" onclick="nextModule()">Next module \u2192</button>
    </div>
  `;
}

function selectNode(id) {
  currentId = id;
  currentStep = 0;
  document.getElementById('start-guide').classList.add('hidden');
  highlightNode(id);
  renderPanel();
}

function findEdges() {
  const svg = document.querySelector('#flow-container svg');
  if (!svg) return [];
  return Array.from(svg.querySelectorAll('path')).filter(p => {
    const d = p.getAttribute('d') || '';
    return d.length > 50;
  });
}

function initEdges() {
  findEdges().forEach(p => {
    p.classList.remove('flow-active', 'flow-dim');
    p.classList.add('flow-idle');
  });
}

function highlightNode(id) {
  document.querySelectorAll('#flow-container .node').forEach(n => n.classList.remove('node-active'));
  const svg = document.querySelector('#flow-container svg');
  if (!svg) return;
  const nodeEl = svg.querySelector(`[id*="flowchart-${id}-"]`);
  if (nodeEl) nodeEl.classList.add('node-active');
  const edges = findEdges();
  if (edges.length === 0) return;
  edges.forEach(p => {
    p.classList.remove('flow-active', 'flow-dim');
    const parentId = p.parentElement?.id || '';
    if (parentId.includes(id)) {
      p.classList.add('flow-active');
    } else {
      p.classList.add('flow-dim');
    }
  });
}

function nextStep() {
  if (!currentId) return;
  const d = COURSE[currentId];
  if (currentStep < d.steps.length - 1) { currentStep++; renderPanel(); }
}
function prevStep() { if (currentStep > 0) { currentStep--; renderPanel(); } }
function nextModule() {
  if (!currentId) return;
  const idx = COURSE.flowOrder.indexOf(currentId);
  if (idx < COURSE.flowOrder.length - 1) selectNode(COURSE.flowOrder[idx + 1]);
}
function zoomIn() { zoomLevel = Math.min(2.5, zoomLevel + 0.2); applyZoom(); }
function zoomOut() { zoomLevel = Math.max(0.4, zoomLevel - 0.2); applyZoom(); }
function zoomReset() { zoomLevel = 1; applyZoom(); }
function applyZoom() {
  document.getElementById('flow-container').style.transform = `scale(${zoomLevel})`;
}

mermaid.initialize({
  startOnLoad: true,
  securityLevel: 'loose',
  theme: 'dark',
  themeVariables: {
    primaryColor: '#1b1c1e',
    primaryBorderColor: '#434345',
    primaryTextColor: '#f9f9f9',
    lineColor: '#434345',
    secondaryColor: '#101111',
    tertiaryColor: '#07080a',
    fontFamily: 'Inter, -apple-system, sans-serif',
    fontSize: '14px',
    nodeBorder: '#434345',
    edgeLabelBackground: '#101111',
  },
  flowchart: { curve: 'basis', padding: 20, nodeSpacing: 60, rankSpacing: 80 }
});

window.callback = function(nodeId) { selectNode(nodeId); };
window.addEventListener('load', function() { setTimeout(initEdges, 500); });
</script>
</body>
</html>
