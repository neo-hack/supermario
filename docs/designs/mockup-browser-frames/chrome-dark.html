<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chrome Dark Browser Mockup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav class="preview-nav" aria-label="Mockup previews">
      <a class="preview-link" href="./index.html">Chrome Light</a>
      <a class="preview-link is-active" href="./chrome-dark.html">Chrome Dark</a>
      <a class="preview-link" href="./safari-light.html">Safari Light</a>
      <a class="preview-link" href="./safari-dark.html">Safari Dark</a>
    </nav>
    <main class="stage" aria-label="Chrome dark browser mockup">
      <section class="browser chrome-dark" aria-label="Khazifire website in Chrome dark mode">
        <header class="toolbar">
          <div class="tab-bar">
            <div class="window-controls" aria-hidden="true">
              <span class="control control-close"></span>
              <span class="control control-minimize"></span>
              <span class="control control-maximize"></span>
            </div>

            <div class="tab">
              <span class="tab-title">Khazifire - Web mockups</span>
            </div>

            <button class="new-tab" aria-label="New tab">
              <img src="./assets/chrome-dark-plus.svg" alt="" />
            </button>

            <button class="tab-menu" aria-label="Tab menu">
              <img src="./assets/chrome-dark-chevron.svg" alt="" />
            </button>
          </div>

          <div class="nav-bar">
            <button class="nav-button" aria-label="Back">
              <img src="./assets/chrome-dark-back.svg" alt="" />
            </button>
            <button class="nav-button" aria-label="Forward">
              <img src="./assets/chrome-dark-forward.svg" alt="" />
            </button>
            <button class="nav-button refresh" aria-label="Refresh">
              <img src="./assets/chrome-dark-refresh.svg" alt="" />
            </button>

            <div class="address-bar" role="textbox" aria-label="Address">
              <img class="address-lock" src="./assets/chrome-dark-padlock.svg" alt="" />
              <span>khazifire.com</span>
              <button class="address-action share" aria-label="Share">
                <img src="./assets/chrome-dark-share.svg" alt="" />
              </button>
              <button class="address-action star" aria-label="Bookmark">
                <img src="./assets/chrome-dark-star.svg" alt="" />
              </button>
            </div>

            <button class="chrome-action" aria-label="Extensions">
              <img src="./assets/chrome-dark-extension.svg" alt="" />
            </button>
            <button class="chrome-action" aria-label="Profile">
              <img src="./assets/chrome-dark-toggle.svg" alt="" />
            </button>
            <button class="chrome-action more" aria-label="More options">
              <img src="./assets/chrome-dark-more.svg" alt="" />
            </button>
          </div>
          <div class="toolbar-shadow"></div>
        </header>

        <div class="screen">
          <img
            src="./assets/chrome-dark-screen.png"
            alt="Khazifire portfolio homepage"
          />
        </div>
      </section>
    </main>
  </body>
</html>
